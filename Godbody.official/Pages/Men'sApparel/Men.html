<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Men's Gym Clothes & Workout Clothes - Godbody</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="test.js" defer></script>
</head>
<style>
    .search-wrapper{display: flex;
                    flex-direction: column;
                    gap: .25rem;}
    input{font-size: 1rem;
    }
    .user-cards{
        padding: 2px; 
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
        gap: .25rem;
        margin-top: 1rem;
    }
    .card{
        /* border: 1px solid black; */
        --padding: 1rem;
        background-color: white;
        border-radius: .25rem;
        /* overflow: hidden; */
    }
   
    .card > .header{
        margin-top: .25rem;
        margin-bottom: .25rem;
    }
    .card > .body{
        margin-bottom: .25em;
        font-size: .8rem;
        color:black;
    }
    .hide{
        display: none;
    }
    .card-header{
       box-shadow:gray 0 0 10px;
        padding: var(--padding);
        padding-bottom: 0;
    }
    .card-header.card-image{
        border-radius: .25rem;
        border: 1px solid white;
        padding: 0;
        overflow: hidden;
    }
    .card-header.card-image > img{
        display: block;
        width: 100%;
        max-height: 300px;
        aspect-ratio: 2/3;
        object-fit: cover;
        object-position: center;
        transition: 200ms transform ease-in-out;
    }
    .card:hover > .card-header.card-image > img{
        transform: scale(1.025);
    }
</style>
<body>
    
    <div class="search-wrapper">
        <label for="search">Search Users</label>
        <input type="text" id="search" data-search>
    </div>
        <div class="user-cards" data-user-cards-container>
        <div>
                <div class="card">
                    <div class="card-header card-image">
                        <img src="../Images/IMG_0290.jpg" alt="">
                    </div>
                    <div class="header">Felix Eliassaint</div>
                    <div class="body"> @gmail.com</div>
                </div>
        
        </div>
        <template data-user-template>
            <div class="card">
                <div class="header"data-header></div>
                <div class="body" data-body></div>
            </div>
        </template>
    

</body>
</html>
